                  {["₺","$","€"].map(p=>(
                    <button key={p} onClick={()=>setAyarlar(a=>({...a,paraBirimi:p}))} style={{
                      flex:1, padding:"10px", borderRadius:10, cursor:"pointer", fontFamily:"inherit",
                      border:`2px solid ${ayarlar.paraBirimi===p?COLORS.green:COLORS.cardBorder}`,
                      background: ayarlar.paraBirimi===p ? COLORS.greenSoft : COLORS.bg,
                      color: ayarlar.paraBirimi===p ? COLORS.green : COLORS.muted,
                      fontSize:16, fontWeight:"bold" }}>
                      {p}
                    </button>
                  ))}
                </div>
              </div>

              {/* Maaş & Prim */}
              <div style={{ marginBottom:16 }}>
                <div style={{ color:COLORS.muted, fontSize:11, marginBottom:6, textTransform:"uppercase", letterSpacing:1 }}>Maaş & Prim</div>
                <div style={{ display:"flex", gap:8 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ color:COLORS.muted, fontSize:10, marginBottom:4 }}>💼 Aylık Maaş</div>
                    <div style={{ position:"relative" }}>
                      <input type="number" value={ayarlar.maasUcret||64748}
                        onChange={e=>setAyarlar(a=>({...a,maasUcret:parseFloat(e.target.value)||0}))}
                        style={{ width:"100%", background:COLORS.bg, border:`1px solid ${COLORS.cardBorder}`, borderRadius:10,
                          padding:"9px 28px 9px 10px", color:COLORS.text, fontSize:13, fontWeight:"bold",
                          outline:"none", boxSizing:"border-box", fontFamily:"inherit" }}/>
                      <span style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", color:COLORS.green, fontSize:13, fontWeight:"bold" }}>{ayarlar.paraBirimi}</span>
                    </div>
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ color:COLORS.muted, fontSize:10, marginBottom:4 }}>🏆 Çeyreklik Prim</div>
                    <div style={{ position:"relative" }}>
                      <input type="number" value={ayarlar.primUcret||54578}
                        onChange={e=>setAyarlar(a=>({...a,primUcret:parseFloat(e.target.value)||0}))}
                        style={{ width:"100%", background:COLORS.bg, border:`1px solid ${COLORS.cardBorder}`, borderRadius:10,
                          padding:"9px 28px 9px 10px", color:COLORS.text, fontSize:13, fontWeight:"bold",
                          outline:"none", boxSizing:"border-box", fontFamily:"inherit" }}/>
                      <span style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", color:COLORS.green, fontSize:13, fontWeight:"bold" }}>{ayarlar.paraBirimi}</span>
                    </div>
                  </div>
                </div>
              </div>

              {/* Mesai Ücretleri */}
              <div style={{ marginBottom:16 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <div style={{ color:COLORS.muted, fontSize:11, textTransform:"uppercase", letterSpacing:1 }}>Mesai Ücreti</div>
                  <button onClick={()=>setAyarlar(a=>({...a,mesaiAktif:!a.mesaiAktif}))} style={{
                    padding:"4px 14px", borderRadius:20, cursor:"pointer", fontFamily:"inherit", fontSize:11, fontWeight:"bold",
                    border:`2px solid ${ayarlar.mesaiAktif!==false?COLORS.green:COLORS.cardBorder}`,
                    background: ayarlar.mesaiAktif!==false ? COLORS.greenSoft : "transparent",
                    color: ayarlar.mesaiAktif!==false ? COLORS.green : COLORS.muted,
                  }}>{ayarlar.mesaiAktif!==false ? "✅ Kademeli" : "⚡ Sabit"}</button>
                </div>
                {ayarlar.mesaiAktif!==false ? (
                  <div style={{ display:"flex", gap:8 }}>
                    <div style={{ flex:1 }}>
                      <div style={{ color:COLORS.muted, fontSize:10, marginBottom:4 }}>İlk 5 saat</div>
                      <div style={{ position:"relative" }}>
                        <input type="number" value={ayarlar.mesaiUcret1}
                          onChange={e=>setAyarlar(a=>({...a,mesaiUcret1:parseFloat(e.target.value)||0}))}
                          style={{ width:"100%", background:COLORS.bg, border:`1px solid ${COLORS.cardBorder}`, borderRadius:10,
                            padding:"9px 28px 9px 10px", color:COLORS.text, fontSize:14, fontWeight:"bold",
                            outline:"none", boxSizing:"border-box", fontFamily:"inherit" }}/>
                        <span style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", color:COLORS.accent, fontSize:13, fontWeight:"bold" }}>{ayarlar.paraBirimi}</span>
                      </div>
                      <div style={{ color:COLORS.muted, fontSize:10, marginTop:4, textAlign:"center" }}>{ayarlar.mesaiUcret1||273}{ayarlar.paraBirimi}/saat</div>
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ color:COLORS.muted, fontSize:10, marginBottom:4 }}>5 saat sonrası</div>
                      <div style={{ position:"relative" }}>
                        <input type="number" value={ayarlar.mesaiUcret2}
                          onChange={e=>setAyarlar(a=>({...a,mesaiUcret2:parseFloat(e.target.value)||0}))}
                          style={{ width:"100%", background:COLORS.bg, border:`1px solid ${COLORS.cardBorder}`, borderRadius:10,
                            padding:"9px 28px 9px 10px", color:COLORS.text, fontSize:14, fontWeight:"bold",
                            outline:"none", boxSizing:"border-box", fontFamily:"inherit" }}/>
                        <span style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", color:COLORS.accent, fontSize:13, fontWeight:"bold" }}>{ayarlar.paraBirimi}</span>
                      </div>
                      <div style={{ color:COLORS.muted, fontSize:10, marginTop:4, textAlign:"center" }}>{ayarlar.mesaiUcret2||328}{ayarlar.paraBirimi}/saat</div>
                    </div>
                  </div>
                ) : (
                  <div>
                    <div style={{ color:COLORS.muted, fontSize:10, marginBottom:4 }}>Saatlik sabit ücret</div>
                    <div style={{ position:"relative" }}>
                      <input type="number" value={ayarlar.mesaiUcret1}
                        onChange={e=>setAyarlar(a=>({...a,mesaiUcret1:parseFloat(e.target.value)||0}))}
                        style={{ width:"100%", background:COLORS.bg, border:`1px solid ${COLORS.cardBorder}`, borderRadius:10,
                          padding:"9px 28px 9px 10px", color:COLORS.text, fontSize:14, fontWeight:"bold",
                          outline:"none", boxSizing:"border-box", fontFamily:"inherit" }}/>
                      <span style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", color:COLORS.accent, fontSize:13, fontWeight:"bold" }}>{ayarlar.paraBirimi}</span>
                    </div>
                    <div style={{ color:COLORS.muted, fontSize:10, marginTop:4, textAlign:"center" }}>Tüm saatler → {ayarlar.mesaiUcret1||273}{ayarlar.paraBirimi}/saat</div>
                  </div>
                )}
                {/* Bayram ücreti - her iki modda da göster */}
                <div style={{ marginTop:10 }}>
                  <div style={{ color:COLORS.muted, fontSize:10, marginBottom:4 }}>🎉 Bayram saatlik ücret</div>
                  <div style={{ position:"relative" }}>
                    <input type="number" value={ayarlar.mesaiBayram||436}
                      onChange={e=>setAyarlar(a=>({...a,mesaiBayram:parseFloat(e.target.value)||0}))}
                      style={{ width:"100%", background:COLORS.bg, border:`1px solid #F59E0B60`, borderRadius:10,
                        padding:"9px 28px 9px 10px", color:"#F59E0B", fontSize:14, fontWeight:"bold",
                        outline:"none", boxSizing:"border-box", fontFamily:"inherit" }}/>
                    <span style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", color:"#F59E0B", fontSize:13, fontWeight:"bold" }}>{ayarlar.paraBirimi}</span>
                  </div>
                  <div style={{ color:COLORS.muted, fontSize:10, marginTop:4, textAlign:"center" }}>Tüm bayram saatleri → {ayarlar.mesaiBayram||436}{ayarlar.paraBirimi}/saat</div>
                </div>
              </div>

              <button onClick={()=>setShowSettings(false)} style={{ width:"100%", padding:"12px",
                background:`linear-gradient(135deg,${COLORS.accent},#FF8C5A)`,
                border:"none", borderRadius:12, color:"#fff", fontSize:14, fontWeight:"bold", cursor:"pointer", fontFamily:"inherit" }}>
                ✅ Kaydet & Kapat
              </button>
            </div>
          </div>
        )}

        {/* Tabs */}
        <div style={{ display:"flex", background:COLORS.card, borderBottom:`1px solid ${COLORS.cardBorder}`, overflowX:"auto" }}>
          {[["tasks","📋"],["calendar","📅"],["notes","📝"],["finance","💰"]].map(([tab,label])=>(
            <button key={tab} onClick={()=>setActiveTab(tab)} style={{
              flex:"1 0 25%", minWidth:0, padding:"11px 4px", background:"none", border:"none",
              color:activeTab===tab?COLORS.accent:COLORS.muted,
              fontSize:20, cursor:"pointer",
              borderBottom:activeTab===tab?`2px solid ${COLORS.accent}`:"2px solid transparent",
            }}>{label}</button>
          ))}
        </div>

        {/* Content */}
        <div style={{ flex:1, overflowY:"auto", padding:16 }}>

          {activeTab==="tasks" && (
            <>
              <div style={{ display:"flex", gap:8, marginBottom:14 }}>
                {[["tümü","Tümü"],["bekleyen","Bekleyen"],["tamamlanan","Tamamlanan"]].map(([f,l])=>(
                  <button key={f} onClick={()=>setFilter(f)} style={{ padding:"6px 12px", borderRadius:20,
                    border:`1px solid ${filter===f?COLORS.green:COLORS.cardBorder}`,
                    background:filter===f?COLORS.greenSoft:"transparent",
                    color:filter===f?COLORS.green:COLORS.muted,
                    fontSize:12, cursor:"pointer", fontFamily:"inherit" }}>{l}</button>
                ))}
              </div>

              <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:14 }}>
                {filteredTasks.length===0 && <div style={{ textAlign:"center", color:COLORS.muted, padding:"40px 0", fontSize:14 }}>Görev bulunamadı 🎉</div>}
                {filteredTasks.map(task=>(
                  <div key={task.id} style={{ background:COLORS.card,
                    border:`1px solid ${task.done?COLORS.cardBorder:priorities[task.priority].color+"40"}`,
                    borderRadius:14, padding:14, display:"flex", alignItems:"flex-start", gap:12,
                    opacity:task.done?0.6:1 }}>
                    <button onClick={()=>setTasks(p=>p.map(t=>t.id===task.id?{...t,done:!t.done}:t))}
                      style={{ width:22,height:22,borderRadius:"50%",flexShrink:0,
                        border:`2px solid ${task.done?COLORS.green:priorities[task.priority].color}`,
                        background:task.done?COLORS.green:"transparent",
                        cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginTop:1 }}>
                      {task.done&&<span style={{ color:"#fff",fontSize:12 }}>✓</span>}
                    </button>
                    <div style={{ flex:1 }}>
                      <div style={{ color:COLORS.text, fontSize:14, textDecoration:task.done?"line-through":"none", marginBottom:6 }}>{task.text}</div>
                      <div style={{ display:"flex", gap:6 }}>
                        <Badge color={priorities[task.priority].color} bg={priorities[task.priority].bg}>{priorities[task.priority].label}</Badge>
                        <Badge color={taskTypes[task.type]?.color||COLORS.muted} bg={taskTypes[task.type]?.bg||"transparent"}>{taskTypes[task.type]?.emoji} {taskTypes[task.type]?.label||task.type}</Badge>
                      </div>
                    </div>
                    <button onClick={()=>setTasks(p=>p.filter(t=>t.id!==task.id))} style={{ background:"none",border:"none",color:COLORS.muted,cursor:"pointer",fontSize:18,padding:0 }}>×</button>
                  </div>
                ))}
              </div>

              {/* Add button or form — below the list */}
              {!showAddTask ? (
                <button onClick={()=>setShowAddTask(true)} style={{
                  width:"100%", padding:"12px",
                  background:COLORS.card, border:`2px dashed ${COLORS.accent}60`,
                  borderRadius:14, color:COLORS.accent, fontSize:14, fontWeight:"bold",
                  cursor:"pointer", fontFamily:"inherit", display:"flex", alignItems:"center", justifyContent:"center", gap:8,
                }}>+ Yeni Görev Ekle</button>
              ) : (
                <div style={{ background:COLORS.card, borderRadius:16, border:`1px solid ${COLORS.accent}40`, padding:14 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                    <span style={{ color:COLORS.accent, fontWeight:"bold", fontSize:13 }}>Yeni Görev</span>
                    <button onClick={()=>{setShowAddTask(false);setNewTask("");}} style={{ background:"none",border:"none",color:COLORS.muted,cursor:"pointer",fontSize:18 }}>×</button>
                  </div>
                  <input value={newTask} onChange={e=>setNewTask(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTask()}
                    placeholder="Görev adı..." autoFocus
                    style={{ width:"100%", background:COLORS.bg, border:`1px solid ${COLORS.cardBorder}`, borderRadius:10,
                      padding:"10px 12px", color:COLORS.text, fontSize:14, outline:"none", boxSizing:"border-box",
                      marginBottom:10, fontFamily:"inherit" }}/>
                  <div style={{ display:"flex", gap:8, marginBottom:10 }}>
                    {Object.entries(priorities).map(([k,v])=>(
                      <button key={k} onClick={()=>setNewPriority(k)} style={{ flex:1, padding:"6px 4px", borderRadius:8,
                        border:`1px solid ${newPriority===k?v.color:COLORS.cardBorder}`,
                        background:newPriority===k?v.bg:"transparent", color:newPriority===k?v.color:COLORS.muted,
                        fontSize:11, cursor:"pointer", fontFamily:"inherit" }}>{v.label}</button>
                    ))}
                  </div>
                  <div style={{ display:"flex", gap:6, marginBottom:10, flexWrap:"wrap" }}>
                    {Object.entries(taskTypes).map(([k,v])=>(
                      <button key={k} onClick={()=>setNewType(k)} style={{ padding:"5px 10px", borderRadius:20,
                        border:`1px solid ${newType===k?v.color:COLORS.cardBorder}`,
                        background:newType===k?v.bg:"transparent",
                        color:newType===k?v.color:COLORS.muted,
                        fontSize:11, cursor:"pointer", fontFamily:"inherit" }}>{v.emoji} {v.label}</button>
                    ))}
                  </div>
                  <button onClick={addTask} style={{ width:"100%", padding:12,
                    background:`linear-gradient(135deg,${COLORS.accent},#FF8C5A)`,
                    border:"none", borderRadius:12, color:"#fff", fontSize:14, fontWeight:"bold",
                    cursor:"pointer", fontFamily:"inherit" }}>✅ Ekle</button>
                </div>
              )}
            </>
          )}

          {activeTab==="calendar" && <CalendarTab reminders={reminders} setReminders={setReminders}/>}

          {activeTab==="finance" && <FinanceTab ayarlar={ayarlar}/>}
          {activeTab==="notes" && <NotesTab notes={notes} setNotes={setNotes}/>}

        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GorevAsistani/>);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      const swCode = `
const CACHE = 'asistan-zi-v2';
self.addEventListener('install', e => {
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(clients.claim());
});
self.addEventListener('fetch', e => {
  e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
});
`;
      const blob = new Blob([swCode], {type: 'application/javascript'});
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).then(r => console.log('SW registered')).catch(e => console.log('SW error', e));
    }
  </script>
</body>
</html>
